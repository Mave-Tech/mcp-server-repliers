name: Build and Push to ECR

on:
  workflow_call:
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      SLACK_FAILURE_WEBHOOK_URL:
        required: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build, tag, and push image to Amazon ECR
        run: |
          docker buildx build \
            --push \
            --tag "${{ steps.login-ecr.outputs.registry }}/mcp-server-repliers:${{ github.sha }}" \
            --cache-from "type=registry,ref=${{ steps.login-ecr.outputs.registry }}/mcp-server-repliers:cache" \
            --cache-to "type=registry,ref=${{ steps.login-ecr.outputs.registry }}/mcp-server-repliers:cache,mode=max,image-manifest=true,oci-mediatypes=true" \
            . 2>&1 | tee /tmp/docker_output.txt; exit ${PIPESTATUS[0]}

      - name: Prepare Slack payload
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          GH_RUN_ID: ${{ github.run_id }}
          GH_SERVER: ${{ github.server_url }}
          GH_RUNNER: ${{ runner.name }}
          GH_REF_NAME: ${{ github.ref_name }}
          GH_ACTOR: ${{ github.actor }}
          GH_SHA: ${{ github.sha }}
          GH_COMMIT_MSG: ${{ github.event.head_commit.message }}
          GH_REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set +e
          JOB_ID=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$GH_REPO/actions/runs/$GH_RUN_ID/jobs" \
            2>/dev/null \
            | jq -r --arg runner "$GH_RUNNER" \
              '[.jobs[] | select(.runner_name == $runner)] | last | .id // empty' \
              2>/dev/null)
          JOB_URL="$GH_SERVER/$GH_REPO/actions/runs/$GH_RUN_ID"
          [ -n "$JOB_ID" ] && JOB_URL="${JOB_URL}/job/${JOB_ID}"

          ERROR_LOG=$(tail -30 /tmp/docker_output.txt 2>/dev/null || echo "No output captured")
          jq -n \
            --arg branch "$GH_REF_NAME" \
            --arg actor "$GH_ACTOR" \
            --arg sha "$GH_SHA" \
            --arg commit_msg "$GH_COMMIT_MSG" \
            --arg job_url "$JOB_URL" \
            --arg commit_url "$GH_SERVER/$GH_REPO/commit/$GH_SHA" \
            --arg repo "$GH_REPO_NAME" \
            --arg error "$ERROR_LOG" \
            '{
              "attachments": [{
                "color": "danger",
                "blocks": [
                  {"type": "divider"},
                  {
                    "type": "header",
                    "text": {"type": "plain_text", "text": (":red_circle: Build & Push " + $repo + " - failed on " + $branch), "emoji": true}
                  },
                  {
                    "type": "section",
                    "fields": [
                      {"type": "mrkdwn", "text": ("*Triggered by:*\n" + $actor)},
                      {"type": "mrkdwn", "text": ("*Commit:*\n<" + $commit_url + "|" + $sha + ">")}
                    ]
                  },
                  {
                    "type": "section",
                    "fields": [
                      {"type": "mrkdwn", "text": ("*Commit message:*\n" + $commit_msg)},
                      {"type": "mrkdwn", "text": ("<" + $job_url + "|View failed job>")}
                    ]
                  },
                  {
                    "type": "section",
                    "text": {"type": "mrkdwn", "text": ("*Error log:*\n```\n" + $error + "\n```")}
                  }
                ]
              }]
            }' > /tmp/slack_payload.json
          if [ ! -f /tmp/slack_payload.json ]; then
            echo '{"text":":red_circle: *Build & Push* failed. <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"}' > /tmp/slack_payload.json
          fi

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v3
        with:
          webhook: ${{ secrets.SLACK_FAILURE_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload-file-path: /tmp/slack_payload.json
